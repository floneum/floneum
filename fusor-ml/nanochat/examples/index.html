<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nanochat Samples</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f1e7;
      --panel: #fffaf0;
      --ink: #2a2a2a;
      --line: #dccfb5;
    }

    body {
      margin: 0;
      font-family: "Iowan Old Style", "Palatino Linotype", serif;
      background: linear-gradient(180deg, #efe4cf 0%, var(--bg) 100%);
      color: var(--ink);
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 40px;
      font-weight: 700;
    }

    p {
      margin: 0 0 24px;
      font-size: 18px;
      opacity: 0.8;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 18px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 10px 30px rgba(90, 70, 40, 0.08);
    }

    .card img {
      display: block;
      width: 100%;
      aspect-ratio: 1;
      background: white;
      border-radius: 12px;
    }

    .card a {
      display: inline-block;
      margin-top: 10px;
      color: inherit;
      text-decoration: none;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Nanochat Sample Outputs</h1>
    <p>Seeded inference samples exported from the current stroke model checkpoint.</p>
    <section class="grid">
      <article class="card"><img src="sample-101.svg" alt="sample 101"><a href="sample-101.svg">sample-101.svg</a></article>
      <article class="card"><img src="sample-102.svg" alt="sample 102"><a href="sample-102.svg">sample-102.svg</a></article>
      <article class="card"><img src="sample-103.svg" alt="sample 103"><a href="sample-103.svg">sample-103.svg</a></article>
      <article class="card"><img src="sample-104.svg" alt="sample 104"><a href="sample-104.svg">sample-104.svg</a></article>
      <article class="card"><img src="sample-105.svg" alt="sample 105"><a href="sample-105.svg">sample-105.svg</a></article>
      <article class="card"><img src="sample-106.svg" alt="sample 106"><a href="sample-106.svg">sample-106.svg</a></article>
      <article class="card"><img src="sample-107.svg" alt="sample 107"><a href="sample-107.svg">sample-107.svg</a></article>
      <article class="card"><img src="sample-108.svg" alt="sample 108"><a href="sample-108.svg">sample-108.svg</a></article>
      <article class="card"><img src="sample-109.svg" alt="sample 109"><a href="sample-109.svg">sample-109.svg</a></article>
      <article class="card"><img src="sample-110.svg" alt="sample 110"><a href="sample-110.svg">sample-110.svg</a></article>
      <article class="card"><img src="sample-111.svg" alt="sample 111"><a href="sample-111.svg">sample-111.svg</a></article>
      <article class="card"><img src="sample-112.svg" alt="sample 112"><a href="sample-112.svg">sample-112.svg</a></article>
    </section>
  </main>
</body>
</html>
