[package]
name = "segment-anything-rs"
version = "0.4.0"
edition = "2021"
description = "A simple interface for Segment Anything models "
license = "MIT/Apache-2.0"
repository = "https://github.com/floneum/floneum"
authors = ["Evan Almloff <evanalmloff@gmail.com>"]
keywords = ["ai", "segment-anything", "segmentation", "computer-vision"]

[dependencies]
fusor = { workspace = true }
fusor-gguf = { workspace = true }
hf-hub = { version = "0.4.0" }
thiserror.workspace = true
pollster = "0.4"

tracing = "0.1.37"
image.workspace = true

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
candle-core = { workspace = true, features = ["metal"] }
candle-nn = { workspace = true }
candle-transformers = { workspace = true }

[features]
cuda = []
metal = []
mkl = []
accelerate = []
